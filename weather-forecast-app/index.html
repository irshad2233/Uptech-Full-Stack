<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-6 rounded-xl shadow-lg w-[400px]">

<h1 class="text-2xl font-bold text-center mb-4">Weather App</h1>

<div class="flex gap-2 mb-4">
<input id="city"
type="text"
placeholder="Enter city name"
class="border p-2 rounded w-full">

<button onclick="getWeather()"
class="bg-blue-500 text-white px-4 py-2 rounded">
Search
</button>
</div>

<div id="currentWeather" class="text-center mb-4"></div>

<div id="forecast" class="grid grid-cols-2 gap-3"></div>

</div>

    <script src="app.js"></script>
</body>
</html>
